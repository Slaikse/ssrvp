<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лабораторная работа 1 — Vanilla JS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px;
      gap: 32px;
    }

    h1 {
      font-size: 1.8rem;
      color: #7c3aed;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d2f3e;
      border-radius: 12px;
      padding: 28px 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .card h2 {
      font-size: 1.1rem;
      color: #a78bfa;
      margin-bottom: 18px;
      border-bottom: 1px solid #2d2f3e;
      padding-bottom: 8px;
    }

    /* Counter */
    .counter-display {
      font-size: 2.8rem;
      font-weight: 700;
      text-align: center;
      color: #c4b5fd;
      margin: 12px 0 20px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 22px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }

    .btn-success {
      background: #059669;
      color: #fff;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .btn-secondary {
      background: #374151;
      color: #e2e8f0;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #7c3aed;
      color: #a78bfa;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.85rem;
      color: #9ca3af;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    #auth-message {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
    }

    #auth-message.success {
      background: rgba(5, 150, 105, 0.15);
      border: 1px solid #059669;
      color: #34d399;
      display: block;
    }

    #auth-message.error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid #dc2626;
      color: #f87171;
      display: block;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.78rem;
      color: #6b7280;
      background: #0f1117;
      border-radius: 6px;
      padding: 8px 12px;
      border-left: 3px solid #374151;
    }
  </style>
</head>
<body>

<h1>Лабораторная работа № 1</h1>

<!-- COUNTER CARD -->
<div class="card">
  <h2>Счётчик</h2>
  <div class="counter-display" id="counter-value">0</div>
  <div class="btn-row">
    <!-- onclick attribute (requirement 2) -->
    <button class="btn-success" onclick="incrementCounter()">＋ Увеличить</button>
    <!-- addEventListener (requirement 3) -->
    <button class="btn-danger" id="btn-decrement">－ Уменьшить</button>
    <button class="btn-secondary" id="btn-reset">↺ Сброс</button>
  </div>
</div>

<!-- AUTH FORM CARD -->
<div class="card">
  <h2>Авторизация</h2>
  <!-- form element (requirement 4) -->
  <form id="auth-form">
    <div class="form-group">
      <label for="login-input">Логин</label>
      <input type="text" id="login-input" name="login" placeholder="Введите логин" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password-input">Пароль</label>
      <input type="password" id="password-input" name="password" placeholder="Введите пароль" autocomplete="current-password" />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Войти</button>
      <!-- clear button (requirement 5) -->
      <button type="button" class="btn-secondary" id="btn-clear">Очистить</button>
    </div>
  </form>

  <div id="auth-message"></div>

  <div class="hint">
    Подсказка: логин <strong>admin</strong>, пароль <strong>admin</strong>
  </div>
</div>

<script>
  // ─── Counter state ────────────────────────────────────────────────────────
  let count = 0;

  function renderCounter() {
    document.getElementById('counter-value').textContent = count;
  }

  // Requirement 2 — onclick attribute
  function incrementCounter() {
    count += 1;
    renderCounter();
  }

  // Requirement 3 — addEventListener
  document.getElementById('btn-decrement').addEventListener('click', function () {
    count -= 1;
    renderCounter();
  });

  document.getElementById('btn-reset').addEventListener('click', function () {
    count = 0;
    renderCounter();
  });

  // ─── Auth Form ────────────────────────────────────────────────────────────
  const authForm = document.getElementById('auth-form');
  const loginInput = document.getElementById('login-input');
  const passwordInput = document.getElementById('password-input');
  const authMessage = document.getElementById('auth-message');

  // Requirement 5 — clear button
  document.getElementById('btn-clear').addEventListener('click', function () {
    loginInput.value = '';
    passwordInput.value = '';
    authMessage.className = '';
    authMessage.textContent = '';
    authMessage.style.display = 'none';
    loginInput.focus();
  });

  // Requirement 6 — addEventListener submit + preventDefault
  authForm.addEventListener('submit', function (event) {
    event.preventDefault();

    const login = loginInput.value.trim();
    const password = passwordInput.value;

    // Requirement 7 — validation
    if (login === 'admin' && password === 'admin') {
      authMessage.textContent = 'Успешная авторизация!';
      authMessage.className = 'success';

      // Requirement 8 — save to localStorage
      localStorage.setItem('savedLogin', login);
      localStorage.setItem('savedPassword', password);
    } else {
      authMessage.textContent = 'Неверный логин или пароль';
      authMessage.className = 'error';
    }
  });

  // Requirement 1 — window.onload alert
  window.onload = function () {
    alert('Страница полностью загружена');

    // Requirement 8 — autofill from localStorage
    const savedLogin = localStorage.getItem('savedLogin');
    const savedPassword = localStorage.getItem('savedPassword');

    if (savedLogin) {
      loginInput.value = savedLogin;
    }
    if (savedPassword) {
      passwordInput.value = savedPassword;
    }
  };
</script>

</body>
</html>
