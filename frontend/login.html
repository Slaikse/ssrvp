<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — BookSwap</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body style="display:flex;flex-direction:column;min-height:100vh">

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand" href="/"><span class="brand-icon">📚</span> BookSwap</a>
    <a href="register.html" class="nav-link">Нет аккаунта? <strong>Зарегистрируйтесь</strong></a>
  </div>
</nav>

<main style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem">
  <div class="form-card">
    <h2 style="margin-bottom:0.25rem">Добро пожаловать</h2>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.75rem">Войдите, чтобы обмениваться книгами</p>

    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="mb-4">
        <label class="form-label">Пароль</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding-right:3rem">
          <button type="button" onclick="togglePwd()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem">👁</button>
        </div>
      </div>

      <div id="error-msg" class="mb-3" style="color:var(--danger);font-size:0.88rem;display:none"></div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center" id="submit-btn">
        Войти
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:0.88rem;color:var(--text-muted)">
      Нет аккаунта? <a href="register.html" style="font-weight:600">Зарегистрируйтесь</a>
    </p>
  </div>
</main>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (getUser()) location.href = '/';
});

function togglePwd() {
    const i = document.getElementById('password');
    i.type = i.type === 'password' ? 'text' : 'password';
}

document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        errEl.textContent = 'Заполните все поля';
        errEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Входим…';

    try {
        const data = await api.login({ email, password });
        setAuth(data.access_token, data.user);
        toast('Добро пожаловать, ' + data.user.username + '!', 'success');
        setTimeout(() => location.href = '/', 500);
    } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Войти';
    }
});
</script>
</body>
</html>
