<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — BookSwap</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand" href="/"><span class="brand-icon">📚</span> BookSwap</a>
    <div class="d-flex align-items-center gap-2" id="nav-guest">
      <a href="catalog.html"  class="nav-link">Каталог</a>
      <a href="login.html"    class="nav-link nav-btn-login">Войти</a>
      <a href="register.html" class="nav-link nav-btn-register">Регистрация</a>
    </div>
    <div class="d-flex align-items-center gap-2" id="nav-auth" style="display:none!important">
      <a href="catalog.html"   class="nav-link">Каталог</a>
      <a href="my-books.html"  class="nav-link">Мои книги</a>
      <a href="exchanges.html" class="nav-link">Обмены</a>
      <a href="profile.html" class="btn-ghost d-flex align-items-center gap-2">
        <span class="nav-user-avatar" id="nav-avatar">U</span>
        <span id="nav-username"></span>
      </a>
      <button onclick="logout()" class="btn-ghost">Выйти</button>
    </div>
  </div>
</nav>

<div id="profile-area">
  <div class="loading-overlay" style="padding:4rem"><div class="spinner" style="border-color:var(--border);border-top-color:var(--primary)"></div></div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal-card">
    <h4 style="margin-bottom:1.5rem">Редактировать профиль</h4>
    <div class="mb-3">
      <label class="form-label">Полное имя</label>
      <input type="text" id="ep-name" class="form-control" placeholder="Иван Петров">
    </div>
    <div class="mb-3">
      <label class="form-label">Город</label>
      <input type="text" id="ep-city" class="form-control" placeholder="Москва">
    </div>
    <div class="mb-3">
      <label class="form-label">О себе</label>
      <textarea id="ep-bio" class="form-control" rows="3" placeholder="Расскажите о себе…"></textarea>
    </div>
    <div class="d-flex gap-2 justify-content-end">
      <button onclick="closeEditModal()" class="btn-ghost">Отмена</button>
      <button onclick="saveProfile()" class="btn-primary-custom" id="save-profile-btn">Сохранить</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
let profileUser = null;
let isOwnProfile = false;

document.addEventListener('DOMContentLoaded', async () => {
    initNavbar();
    const paramId = getQueryParam('id');
    const me = getUser();

    let userId;
    if (paramId) {
        userId = parseInt(paramId);
        isOwnProfile = me && me.id === userId;
    } else {
        if (!me) { location.href = '/login.html'; return; }
        userId = me.id;
        isOwnProfile = true;
    }
    await loadProfile(userId);
});

async function loadProfile(userId) {
    try {
        const [user, books, reviews] = await Promise.all([
            api.getUser(userId),
            api.getUserBooks(userId),
            api.getUserReviews(userId),
        ]);
        profileUser = user;
        renderProfile(user, books, reviews);
    } catch (e) {
        document.getElementById('profile-area').innerHTML =
            `<div class="empty-state"><span class="icon">❌</span><h4>Профиль не найден</h4><p>${escHtml(e.message)}</p></div>`;
    }
}

function renderProfile(user, books, reviews) {
    const color = avatarColor(user.username);
    const name  = user.full_name || user.username;

    document.getElementById('profile-area').innerHTML = `
    <!-- HEADER -->
    <div class="profile-header">
      <div class="container">
        <div class="d-flex align-items-center gap-4 flex-wrap">
          <span class="avatar xl" style="background:${color}">${firstLetter(user.username)}</span>
          <div style="flex:1">
            <h1 style="margin-bottom:0.2rem">${escHtml(name)}</h1>
            <p style="opacity:0.8;margin-bottom:0.25rem">@${escHtml(user.username)}</p>
            <div class="profile-rating">
              ${user.rating > 0 ? starsHtml(user.rating) + `<span style="font-weight:600">${user.rating.toFixed(1)}</span>
              <span style="opacity:0.7;font-size:0.85rem">(${user.reviews_count} отз.)</span>` : '<span style="opacity:0.6;font-size:0.9rem">Нет отзывов</span>'}
            </div>
            ${user.city ? `<p style="opacity:0.75;margin-top:0.35rem;font-size:0.9rem">📍 ${escHtml(user.city)}</p>` : ''}
          </div>
          ${isOwnProfile ? `<button onclick="openEditModal()" class="btn-outline-custom" style="color:white;border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.1)">✏️ Редактировать</button>` : ''}
        </div>
        ${user.bio ? `<p style="margin-top:1.25rem;opacity:0.8;max-width:600px;font-size:0.95rem">${escHtml(user.bio)}</p>` : ''}
        <div class="d-flex gap-4 mt-2" style="opacity:0.75;font-size:0.85rem">
          <span>📚 ${books.length} книг</span>
          <span>📅 На сайте с ${formatDate(user.created_at)}</span>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="container" style="padding:2rem 0 4rem">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchProfileTab('books', this)">Книги (${books.length})</button>
        <button class="tab-btn" onclick="switchProfileTab('reviews', this)">Отзывы (${reviews.length})</button>
      </div>
      <div id="profile-tab-content">${renderBooksTab(books)}</div>
    </div>`;

    window._profileBooks   = books;
    window._profileReviews = reviews;
}

function switchProfileTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('profile-tab-content').innerHTML =
        name === 'books' ? renderBooksTab(window._profileBooks) : renderReviewsTab(window._profileReviews);
}

function renderBooksTab(books) {
    if (!books.length) return `<div class="empty-state"><span class="icon">📚</span><h4>Книг пока нет</h4>${isOwnProfile ? '<a href="my-books.html" class="btn-primary-custom">Добавить книгу</a>' : ''}</div>`;
    return `<div class="row g-3">${books.map(b => `<div class="col-6 col-md-4 col-lg-3">${bookCardHtml(b)}</div>`).join('')}</div>`;
}

function renderReviewsTab(reviews) {
    if (!reviews.length) return `<div class="empty-state"><span class="icon">⭐</span><h4>Отзывов пока нет</h4><p>Отзывы появятся после завершённых обменов</p></div>`;
    return reviews.map(r => {
        const rc = avatarColor(r.reviewer.username);
        return `
        <div class="card-surface mb-3">
          <div class="d-flex align-items-center gap-3 mb-2">
            <span class="avatar sm" style="background:${rc}">${firstLetter(r.reviewer.username)}</span>
            <div>
              <span style="font-weight:600;font-size:0.9rem">${escHtml(r.reviewer.full_name || r.reviewer.username)}</span>
              <div>${starsHtml(r.rating)}</div>
            </div>
            <span style="margin-left:auto;font-size:0.8rem;color:var(--text-muted)">${formatDate(r.created_at)}</span>
          </div>
          ${r.comment ? `<p style="color:var(--text-muted);font-size:0.88rem;margin:0">${escHtml(r.comment)}</p>` : ''}
        </div>`;
    }).join('');
}

function openEditModal() {
    document.getElementById('ep-name').value = profileUser.full_name || '';
    document.getElementById('ep-city').value = profileUser.city || '';
    document.getElementById('ep-bio').value  = profileUser.bio  || '';
    document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
}

async function saveProfile() {
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
        const updated = await api.updateProfile({
            full_name: document.getElementById('ep-name').value.trim(),
            city:      document.getElementById('ep-city').value.trim(),
            bio:       document.getElementById('ep-bio').value.trim(),
        });
        const stored = getUser();
        setAuth(getToken(), { ...stored, ...updated });
        closeEditModal();
        toast('Профиль обновлён!', 'success');
        await loadProfile(updated.id);
        initNavbar();
    } catch (e) {
        toast(e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Сохранить';
    }
}

document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-modal')) closeEditModal();
});
</script>
</body>
</html>
