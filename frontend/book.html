<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Книга — BookSwap</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand" href="/"><span class="brand-icon">📚</span> BookSwap</a>
    <div class="d-flex align-items-center gap-2" id="nav-guest">
      <a href="catalog.html" class="nav-link">Каталог</a>
      <a href="login.html"   class="nav-link nav-btn-login">Войти</a>
      <a href="register.html" class="nav-link nav-btn-register">Регистрация</a>
    </div>
    <div class="d-flex align-items-center gap-2" id="nav-auth" style="display:none!important">
      <a href="catalog.html"   class="nav-link">Каталог</a>
      <a href="my-books.html"  class="nav-link">Мои книги</a>
      <a href="exchanges.html" class="nav-link">Обмены</a>
      <a href="profile.html" class="btn-ghost d-flex align-items-center gap-2">
        <span class="nav-user-avatar" id="nav-avatar">U</span>
        <span id="nav-username"></span>
      </a>
      <button onclick="logout()" class="btn-ghost">Выйти</button>
    </div>
  </div>
</nav>

<div class="container" style="padding:2rem 0 4rem" id="main">
  <div class="loading-overlay"><div class="spinner" style="border-color:var(--border);border-top-color:var(--primary)"></div></div>
</div>

<!-- EXCHANGE MODAL -->
<div class="modal-overlay hidden" id="exchange-modal">
  <div class="modal-card">
    <h4 style="margin-bottom:0.25rem">Предложить обмен</h4>
    <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:1.25rem">Выберите книгу, которую предложите взамен (необязательно)</p>

    <div style="margin-bottom:1rem">
      <label class="form-label">Ваша книга для обмена</label>
      <select id="offered-book" class="form-select">
        <option value="">— Без предложения —</option>
      </select>
    </div>

    <div style="margin-bottom:1.25rem">
      <label class="form-label">Сообщение</label>
      <textarea id="exchange-msg" class="form-control" rows="3" placeholder="Напишите что-нибудь владельцу книги…"></textarea>
    </div>

    <div style="display:flex;gap:0.75rem;justify-content:flex-end">
      <button onclick="closeModal()" class="btn-ghost">Отмена</button>
      <button onclick="submitExchange()" class="btn-primary-custom" id="exchange-submit-btn">Отправить запрос</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
let book = null;
let bookId = null;

document.addEventListener('DOMContentLoaded', async () => {
    initNavbar();
    bookId = parseInt(getQueryParam('id'));
    if (!bookId) { location.href = '/catalog.html'; return; }
    await loadBook();
});

async function loadBook() {
    const main = document.getElementById('main');
    try {
        book = await api.getBook(bookId);
        const user = getUser();
        const isOwner = user && user.id === book.owner_id;
        const canExchange = user && !isOwner && book.status === 'available';

        const coverStyle = bookCoverStyle(book.title);
        const ownerColor = avatarColor(book.owner.username);
        const ownerName  = book.owner.full_name || book.owner.username;

        main.innerHTML = `
        <nav style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem">
            <a href="/" style="color:var(--text-muted)">Главная</a> /
            <a href="/catalog.html" style="color:var(--text-muted)">Каталог</a> /
            <span>${escHtml(book.title)}</span>
        </nav>

        <div class="row g-4">
          <div class="col-md-4 col-lg-3">
            <div class="book-detail-cover" style="${coverStyle}">
                <span class="letter">${firstLetter(book.title)}</span>
            </div>
          </div>

          <div class="col-md-8 col-lg-9">
            <h1 style="font-size:1.9rem;margin-bottom:0.25rem">${escHtml(book.title)}</h1>
            <p style="color:var(--text-muted);font-size:1rem;margin-bottom:1.25rem;font-style:italic">${escHtml(book.author)}</p>

            <div class="d-flex gap-2 flex-wrap mb-3">
                <span class="badge-genre">${genreLabel(book.genre)}</span>
                <span class="badge-condition ${book.condition}">${conditionLabel(book.condition)}</span>
                <span class="badge-status ${book.status}">${statusLabel(book.status)}</span>
            </div>

            <div class="card-surface mb-3" style="padding:1rem">
                <div class="info-row">
                    <span class="label">Жанр</span>
                    <span class="value">${genreLabel(book.genre)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Состояние</span>
                    <span class="value">${conditionLabel(book.condition)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Статус</span>
                    <span class="value">${statusLabel(book.status)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Добавлена</span>
                    <span class="value">${formatDate(book.created_at)}</span>
                </div>
                ${book.description ? `
                <div class="info-row" style="flex-direction:column;gap:0.35rem">
                    <span class="label">Описание</span>
                    <span class="value" style="font-weight:400;color:var(--text-muted)">${escHtml(book.description)}</span>
                </div>` : ''}
            </div>

            <!-- Owner -->
            <div class="card-surface mb-3" style="padding:1rem">
                <p style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:0.75rem">Владелец</p>
                <div class="d-flex align-items-center gap-3">
                    <span class="avatar lg" style="background:${ownerColor}">${firstLetter(book.owner.username)}</span>
                    <div>
                        <div style="font-weight:600">${escHtml(ownerName)}</div>
                        <div style="font-size:0.85rem;color:var(--text-muted)">
                            ${book.owner.city ? '📍 ' + escHtml(book.owner.city) + ' · ' : ''}
                            ${book.owner.rating > 0 ? starsHtml(book.owner.rating) + ' ' + book.owner.rating.toFixed(1) : 'Нет отзывов'}
                        </div>
                    </div>
                    <a href="profile.html?id=${book.owner.id}" class="btn-ghost ms-auto">Профиль</a>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 flex-wrap" id="actions">
                ${canExchange ? `<button onclick="openExchangeModal()" class="btn-primary-custom">🤝 Предложить обмен</button>` : ''}
                ${isOwner ? `<a href="my-books.html" class="btn-outline-custom">✏️ Редактировать</a>` : ''}
                ${!user ? `<a href="login.html" class="btn-primary-custom">Войдите, чтобы обменяться</a>` : ''}
                ${book.status !== 'available' && !isOwner ? `<p style="color:var(--text-muted);font-size:0.9rem;margin:0">Эта книга сейчас недоступна для обмена</p>` : ''}
            </div>
          </div>
        </div>`;
    } catch (e) {
        main.innerHTML = `<div class="empty-state"><span class="icon">❌</span><h4>Книга не найдена</h4><p>${escHtml(e.message)}</p><a href="/catalog.html" class="btn-primary-custom">В каталог</a></div>`;
    }
}

async function openExchangeModal() {
    if (!requireAuth()) return;
    const user = getUser();
    const select = document.getElementById('offered-book');
    select.innerHTML = '<option value="">— Без предложения —</option>';
    try {
        const myBooks = await api.getUserBooks(user.id);
        const available = myBooks.filter(b => b.status === 'available');
        available.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b.id;
            opt.textContent = `${b.title} — ${b.author}`;
            select.appendChild(opt);
        });
    } catch {}
    document.getElementById('exchange-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('exchange-modal').classList.add('hidden');
}

async function submitExchange() {
    const btn = document.getElementById('exchange-submit-btn');
    const offeredId = document.getElementById('offered-book').value;
    const message   = document.getElementById('exchange-msg').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
        await api.proposeExchange({
            book_wanted_id: bookId,
            book_offered_id: offeredId ? parseInt(offeredId) : null,
            message,
        });
        closeModal();
        toast('Запрос на обмен отправлен!', 'success');
        setTimeout(() => location.href = '/exchanges.html', 1000);
    } catch (e) {
        toast(e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Отправить запрос';
    }
}

document.getElementById('exchange-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('exchange-modal')) closeModal();
});
</script>
</body>
</html>
