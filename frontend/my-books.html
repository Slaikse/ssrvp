<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои книги — BookSwap</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand" href="/"><span class="brand-icon">📚</span> BookSwap</a>
    <div class="d-flex align-items-center gap-2">
      <a href="catalog.html"   class="nav-link">Каталог</a>
      <a href="my-books.html"  class="nav-link active">Мои книги</a>
      <a href="exchanges.html" class="nav-link">Обмены</a>
      <a href="profile.html" class="btn-ghost d-flex align-items-center gap-2">
        <span class="nav-user-avatar" id="nav-avatar">U</span>
        <span id="nav-username"></span>
      </a>
      <button onclick="logout()" class="btn-ghost">Выйти</button>
    </div>
  </div>
</nav>

<div class="container" style="padding:2rem 0 4rem">
  <div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-3">
    <div>
      <h1>Мои книги</h1>
      <p style="color:var(--text-muted);margin:0">Управляйте своей библиотекой</p>
    </div>
    <button onclick="openAddModal()" class="btn-primary-custom">+ Добавить книгу</button>
  </div>

  <div id="books-grid" class="row g-3">
    <div class="col-12 loading-overlay">
      <div class="spinner" style="border-color:var(--border);border-top-color:var(--primary)"></div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay hidden" id="book-modal">
  <div class="modal-card" style="max-width:560px">
    <h4 id="modal-title" style="margin-bottom:1.5rem">Добавить книгу</h4>
    <input type="hidden" id="edit-id">

    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Название *</label>
        <input type="text" id="f-title" class="form-control" placeholder="Мастер и Маргарита">
      </div>
      <div class="col-12">
        <label class="form-label">Автор *</label>
        <input type="text" id="f-author" class="form-control" placeholder="Михаил Булгаков">
      </div>
      <div class="col-md-6">
        <label class="form-label">Жанр</label>
        <select id="f-genre" class="form-select">
          <option value="fiction">Художественная</option>
          <option value="fantasy">Фэнтези</option>
          <option value="detective">Детектив</option>
          <option value="science">Наука</option>
          <option value="history">История</option>
          <option value="biography">Биография</option>
          <option value="romance">Романтика</option>
          <option value="children">Детская</option>
          <option value="nonfiction">Нон-фикшн</option>
          <option value="other">Другое</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Состояние</label>
        <select id="f-condition" class="form-select">
          <option value="new">Новая</option>
          <option value="good" selected>Хорошее</option>
          <option value="fair">Удовлетворительное</option>
          <option value="poor">Плохое</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Описание</label>
        <textarea id="f-description" class="form-control" rows="3" placeholder="Краткое описание книги…"></textarea>
      </div>
    </div>

    <div id="modal-error" class="mt-2" style="color:var(--danger);font-size:0.85rem;display:none"></div>

    <div class="d-flex gap-2 justify-content-end mt-3">
      <button onclick="closeBookModal()" class="btn-ghost">Отмена</button>
      <button onclick="saveBook()" class="btn-primary-custom" id="save-btn">Сохранить</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal-card" style="max-width:400px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:0.75rem">🗑️</div>
    <h4>Удалить книгу?</h4>
    <p style="color:var(--text-muted);font-size:0.9rem;margin:0.5rem 0 1.5rem">Это действие нельзя отменить</p>
    <div class="d-flex gap-2 justify-content-center">
      <button onclick="document.getElementById('delete-modal').classList.add('hidden')" class="btn-ghost">Отмена</button>
      <button onclick="confirmDelete()" class="btn-danger-custom" id="delete-btn">Удалить</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
let deleteTarget = null;

document.addEventListener('DOMContentLoaded', () => {
    if (!requireAuth()) return;
    initNavbar();
    loadMyBooks();
});

async function loadMyBooks() {
    const grid = document.getElementById('books-grid');
    const user = getUser();
    try {
        const books = await api.getUserBooks(user.id);
        if (!books.length) {
            grid.innerHTML = `<div class="col-12"><div class="empty-state">
                <span class="icon">📚</span>
                <h4>У вас пока нет книг</h4>
                <p>Добавьте книги, которые готовы отдать в обмен</p>
                <button onclick="openAddModal()" class="btn-primary-custom">+ Добавить первую книгу</button>
            </div></div>`;
            return;
        }
        grid.innerHTML = books.map(b => myBookCardHtml(b)).join('');
    } catch (e) {
        grid.innerHTML = `<div class="col-12 text-center py-5" style="color:var(--danger)">${escHtml(e.message)}</div>`;
    }
}

function myBookCardHtml(book) {
    const coverStyle = bookCoverStyle(book.title);
    return `
    <div class="col-sm-6 col-md-4 col-lg-3">
      <div class="book-card" style="cursor:default">
        <div class="book-cover" style="${coverStyle}" onclick="location.href='book.html?id=${book.id}'" class="cursor-pointer">
          <span class="book-cover-letter">${firstLetter(book.title)}</span>
        </div>
        <div class="book-body">
          <div class="book-title">${escHtml(book.title)}</div>
          <div class="book-author">${escHtml(book.author)}</div>
          <div class="book-meta">
            <span class="badge-genre">${genreLabel(book.genre)}</span>
            <span class="badge-condition ${book.condition}">${conditionLabel(book.condition)}</span>
          </div>
          <div style="margin-top:0.5rem">
            <span class="badge-status ${book.status}">${statusLabel(book.status)}</span>
          </div>
          <div class="d-flex gap-2 mt-2 pt-2" style="border-top:1px solid var(--border)">
            <button onclick="openEditModal(${book.id})" class="btn-ghost" style="flex:1;font-size:0.8rem;padding:0.35rem">✏️ Изменить</button>
            <button onclick="openDeleteModal(${book.id})" class="btn-ghost" style="flex:1;font-size:0.8rem;padding:0.35rem;color:var(--danger)">🗑️ Удалить</button>
          </div>
        </div>
      </div>
    </div>`;
}

let booksCache = {};

async function openEditModal(id) {
    if (!booksCache[id]) {
        try { booksCache[id] = await api.getBook(id); } catch { return; }
    }
    const b = booksCache[id];
    document.getElementById('modal-title').textContent = 'Редактировать книгу';
    document.getElementById('edit-id').value = id;
    document.getElementById('f-title').value = b.title;
    document.getElementById('f-author').value = b.author;
    document.getElementById('f-genre').value = b.genre;
    document.getElementById('f-condition').value = b.condition;
    document.getElementById('f-description').value = b.description || '';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('book-modal').classList.remove('hidden');
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Добавить книгу';
    document.getElementById('edit-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-author').value = '';
    document.getElementById('f-genre').value = 'fiction';
    document.getElementById('f-condition').value = 'good';
    document.getElementById('f-description').value = '';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('book-modal').classList.remove('hidden');
}

function closeBookModal() {
    document.getElementById('book-modal').classList.add('hidden');
}

async function saveBook() {
    const btn = document.getElementById('save-btn');
    const errEl = document.getElementById('modal-error');
    errEl.style.display = 'none';

    const id    = document.getElementById('edit-id').value;
    const title = document.getElementById('f-title').value.trim();
    const author = document.getElementById('f-author').value.trim();
    const genre  = document.getElementById('f-genre').value;
    const condition = document.getElementById('f-condition').value;
    const description = document.getElementById('f-description').value.trim();

    if (!title || !author) {
        errEl.textContent = 'Название и автор обязательны';
        errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
        if (id) {
            const updated = await api.updateBook(parseInt(id), { title, author, genre, condition, description });
            booksCache[updated.id] = updated;
            toast('Книга обновлена', 'success');
        } else {
            await api.createBook({ title, author, genre, condition, description });
            toast('Книга добавлена!', 'success');
        }
        closeBookModal();
        loadMyBooks();
    } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Сохранить';
    }
}

function openDeleteModal(id) {
    deleteTarget = id;
    document.getElementById('delete-modal').classList.remove('hidden');
}

async function confirmDelete() {
    const btn = document.getElementById('delete-btn');
    btn.disabled = true; btn.textContent = '…';
    try {
        await api.deleteBook(deleteTarget);
        document.getElementById('delete-modal').classList.add('hidden');
        toast('Книга удалена', 'success');
        loadMyBooks();
    } catch (e) {
        toast(e.message, 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Удалить';
    }
}

[document.getElementById('book-modal'), document.getElementById('delete-modal')].forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); });
});
</script>
</body>
</html>
