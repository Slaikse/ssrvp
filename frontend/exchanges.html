<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обмены — BookSwap</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="navbar-brand" href="/"><span class="brand-icon">📚</span> BookSwap</a>
    <div class="d-flex align-items-center gap-2">
      <a href="catalog.html"   class="nav-link">Каталог</a>
      <a href="my-books.html"  class="nav-link">Мои книги</a>
      <a href="exchanges.html" class="nav-link active">Обмены</a>
      <a href="profile.html" class="btn-ghost d-flex align-items-center gap-2">
        <span class="nav-user-avatar" id="nav-avatar">U</span>
        <span id="nav-username"></span>
      </a>
      <button onclick="logout()" class="btn-ghost">Выйти</button>
    </div>
  </div>
</nav>

<div class="container" style="padding:2rem 0 4rem">
  <div class="page-header">
    <h1>Обмены</h1>
    <p style="color:var(--text-muted);margin:0">Управляйте входящими и исходящими запросами</p>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('incoming', this)" id="tab-incoming">Входящие</button>
    <button class="tab-btn" onclick="switchTab('outgoing', this)" id="tab-outgoing">Исходящие</button>
    <button class="tab-btn" onclick="switchTab('completed', this)" id="tab-completed">Завершённые</button>
  </div>

  <div id="tab-content">
    <div class="loading-overlay">
      <div class="spinner" style="border-color:var(--border);border-top-color:var(--primary)"></div>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay hidden" id="review-modal">
  <div class="modal-card" style="max-width:440px">
    <h4 style="margin-bottom:1rem">Оставить отзыв</h4>
    <input type="hidden" id="review-exchange-id">
    <input type="hidden" id="review-reviewed-id">

    <div style="margin-bottom:1rem">
      <label class="form-label">Оценка</label>
      <div id="star-picker" style="display:flex;gap:0.4rem;font-size:1.75rem;cursor:pointer">
        <span onclick="setRating(1)" class="rstar">☆</span>
        <span onclick="setRating(2)" class="rstar">☆</span>
        <span onclick="setRating(3)" class="rstar">☆</span>
        <span onclick="setRating(4)" class="rstar">☆</span>
        <span onclick="setRating(5)" class="rstar">☆</span>
      </div>
    </div>
    <div style="margin-bottom:1.25rem">
      <label class="form-label">Комментарий</label>
      <textarea id="review-comment" class="form-control" rows="3" placeholder="Расскажите об обмене…"></textarea>
    </div>
    <div class="d-flex gap-2 justify-content-end">
      <button onclick="closeReviewModal()" class="btn-ghost">Отмена</button>
      <button onclick="submitReview()" class="btn-primary-custom" id="review-btn">Отправить</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
let allExchanges = [];
let currentTab = 'incoming';
let selectedRating = 0;

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    initNavbar();
    await loadExchanges();
    renderTab();
});

async function loadExchanges() {
    try {
        allExchanges = await api.getExchanges();
    } catch (e) {
        document.getElementById('tab-content').innerHTML =
            `<div class="empty-state"><span class="icon">❌</span><h4>${escHtml(e.message)}</h4></div>`;
    }
}

function switchTab(name, btn) {
    currentTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTab();
}

function renderTab() {
    const user = getUser();
    let exchanges;

    if (currentTab === 'incoming') {
        exchanges = allExchanges.filter(e =>
            e.book_wanted.owner_id === user.id && e.status === 'pending'
        );
    } else if (currentTab === 'outgoing') {
        exchanges = allExchanges.filter(e =>
            e.proposer_id === user.id && ['pending','accepted'].includes(e.status)
        );
    } else {
        exchanges = allExchanges.filter(e =>
            ['completed','rejected','cancelled'].includes(e.status)
        );
    }

    const content = document.getElementById('tab-content');
    if (!exchanges.length) {
        const labels = { incoming:'входящих запросов', outgoing:'исходящих запросов', completed:'завершённых обменов' };
        content.innerHTML = `<div class="empty-state">
            <span class="icon">📬</span>
            <h4>Нет ${labels[currentTab]}</h4>
            <p>${currentTab === 'outgoing' ? 'Найдите книгу в каталоге и предложите обмен' : ''}</p>
            ${currentTab === 'outgoing' ? '<a href="catalog.html" class="btn-primary-custom">Перейти в каталог</a>' : ''}
        </div>`;
        return;
    }

    content.innerHTML = exchanges.map(ex => exchangeCardHtml(ex, user)).join('');
}

function exchangeCardHtml(ex, user) {
    const isOwner   = ex.book_wanted.owner_id === user.id;
    const statusCls = exchangeStatusClass(ex.status);
    const proposerColor = avatarColor(ex.proposer.username);

    const wantedCover  = bookCoverStyle(ex.book_wanted.title);
    const offeredCover = ex.book_offered ? bookCoverStyle(ex.book_offered.title) : null;

    let actions = '';
    if (ex.status === 'pending' && isOwner) {
        actions = `
            <button onclick="doAction(${ex.id}, 'accept')" class="btn-primary-custom" style="font-size:0.85rem;padding:0.45rem 1rem">✓ Принять</button>
            <button onclick="doAction(${ex.id}, 'reject')" class="btn-danger-custom" style="font-size:0.85rem;padding:0.45rem 1rem">✕ Отклонить</button>`;
    } else if (ex.status === 'accepted') {
        actions = `<button onclick="doAction(${ex.id}, 'complete')" class="btn-primary-custom" style="font-size:0.85rem;padding:0.45rem 1rem">✓ Завершить обмен</button>`;
        if (ex.proposer_id === user.id) {
            actions += `<button onclick="doAction(${ex.id}, 'cancel')" class="btn-ghost" style="font-size:0.85rem">Отменить</button>`;
        }
    } else if (ex.status === 'pending' && ex.proposer_id === user.id) {
        actions = `<button onclick="doAction(${ex.id}, 'cancel')" class="btn-ghost" style="font-size:0.85rem">Отменить запрос</button>`;
    } else if (ex.status === 'completed' && !ex.review) {
        const reviewedId = isOwner ? ex.proposer_id : ex.book_wanted.owner_id;
        actions = `<button onclick="openReviewModal(${ex.id}, ${reviewedId})" class="btn-outline-custom" style="font-size:0.85rem;padding:0.45rem 1rem">⭐ Оставить отзыв</button>`;
    }

    return `
    <div class="exchange-card">
      <div class="status-bar">
        <div class="d-flex align-items-center gap-2">
          <span class="avatar sm" style="background:${proposerColor}">${firstLetter(ex.proposer.username)}</span>
          <span style="font-size:0.85rem;color:var(--text-muted)">
            ${isOwner ? `<strong>${escHtml(ex.proposer.username)}</strong> хочет вашу книгу` : `Вы хотите книгу <strong>${escHtml(ex.book_wanted.owner.username)}</strong>`}
          </span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-${statusCls}" style="font-size:0.75rem">${exchangeStatusLabel(ex.status)}</span>
          <span style="font-size:0.78rem;color:var(--text-light)">${formatDate(ex.created_at)}</span>
        </div>
      </div>

      <div class="exchange-books">
        <div class="exchange-book-mini">
          <div class="exchange-book-cover-mini" style="${wantedCover}">${firstLetter(ex.book_wanted.title)}</div>
          <div>
            <div style="font-weight:600;font-size:0.85rem">${escHtml(ex.book_wanted.title)}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">${escHtml(ex.book_wanted.author)}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">Хочет получить</div>
          </div>
        </div>
        <div class="exchange-arrow">⇄</div>
        <div class="exchange-book-mini">
          ${ex.book_offered ? `
            <div class="exchange-book-cover-mini" style="${offeredCover}">${firstLetter(ex.book_offered.title)}</div>
            <div>
              <div style="font-weight:600;font-size:0.85rem">${escHtml(ex.book_offered.title)}</div>
              <div style="font-size:0.78rem;color:var(--text-muted)">${escHtml(ex.book_offered.author)}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">Предлагает взамен</div>
            </div>` : `
            <div style="color:var(--text-muted);font-size:0.85rem;font-style:italic">Ничего не предложено взамен</div>`}
        </div>
      </div>

      ${ex.message ? `<div style="margin-top:0.75rem;padding:0.6rem 0.75rem;background:var(--bg);border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text-muted)">
        💬 ${escHtml(ex.message)}</div>` : ''}

      ${actions ? `<div class="d-flex gap-2 flex-wrap mt-3">${actions}</div>` : ''}
    </div>`;
}

async function doAction(id, action) {
    const actions = { accept: api.acceptExchange, reject: api.rejectExchange, complete: api.completeExchange, cancel: api.cancelExchange };
    const labels  = { accept: 'Обмен принят!', reject: 'Запрос отклонён', complete: 'Обмен завершён!', cancel: 'Запрос отменён' };
    try {
        await actions[action](id);
        toast(labels[action], 'success');
        await loadExchanges();
        renderTab();
    } catch (e) {
        toast(e.message, 'error');
    }
}

function openReviewModal(exchangeId, reviewedId) {
    document.getElementById('review-exchange-id').value = exchangeId;
    document.getElementById('review-reviewed-id').value = reviewedId;
    document.getElementById('review-comment').value = '';
    selectedRating = 0;
    updateStars();
    document.getElementById('review-modal').classList.remove('hidden');
}

function closeReviewModal() {
    document.getElementById('review-modal').classList.add('hidden');
}

function setRating(n) { selectedRating = n; updateStars(); }

function updateStars() {
    document.querySelectorAll('.rstar').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
        s.style.color = i < selectedRating ? 'var(--accent)' : 'var(--text-muted)';
    });
}

async function submitReview() {
    if (!selectedRating) { toast('Выберите оценку', 'warning'); return; }
    const btn = document.getElementById('review-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
        await api.createReview({
            exchange_id: parseInt(document.getElementById('review-exchange-id').value),
            reviewed_id: parseInt(document.getElementById('review-reviewed-id').value),
            rating: selectedRating,
            comment: document.getElementById('review-comment').value.trim(),
        });
        closeReviewModal();
        toast('Отзыв отправлен!', 'success');
        await loadExchanges();
        renderTab();
    } catch (e) {
        toast(e.message, 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = 'Отправить';
    }
}

document.getElementById('review-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('review-modal')) closeReviewModal();
});
</script>
</body>
</html>
